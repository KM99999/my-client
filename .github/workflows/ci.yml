name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "postman/**", "deliverables/**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tests + concurrency proofs (Linux + Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: booking
          POSTGRES_PASSWORD: booking
          POSTGRES_DB: booking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U booking"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://booking:booking@localhost:5432/booking?schema=public&connection_limit=20&pool_timeout=30"
      PAYMENT_PROVIDER: "abacatepay"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (state machine + slot math)
        run: npm test

      - name: Integration suite (reserve-race, expiry, webhook)
        run: npm run test:integration

      - name: Concurrency proof (50 x 20 rounds -> exactly one winner)
        run: npm run verify:locking

      - name: Expiry proof
        run: npm run verify:expiry

      - name: Webhook idempotency + payment-at-expiry proof
        run: npm run verify:webhook
