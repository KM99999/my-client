# Codespaces / VS Code Dev Containers: a Node app container that shares the
# Postgres container's network, so DATABASE_URL points at localhost:5432.
services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:1-22-bookworm
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    network_mode: service:db
    environment:
      DATABASE_URL: "postgresql://booking:booking@localhost:5432/booking?schema=public"
      NODE_ENV: "development"
      PAYMENT_PROVIDER: "abacatepay"
      DEFAULT_PRICE_CENTS: "15000"

  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
      POSTGRES_DB: booking

volumes:
  postgres-data:
